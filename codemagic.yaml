workflows:
  android-build:
    name: Android Build
    instance_type: linux
    environment:
      java: 17
      vars:
        ANDROID_HOME: /usr/local/share/android-sdk
        ANDROID_SDK_ROOT: /usr/local/share/android-sdk
        GRADLE_VERSION: "8.2"
    scripts:
      - name: Set up local.properties
        script: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - name: Accept licenses
        script: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
      - name: Install Gradle
        script: |
          curl -sLO https://services.gradle.org/distributions/gradle-$GRADLE_VERSION-bin.zip
          unzip -q gradle-$GRADLE_VERSION-bin.zip -d /opt
          ln -sf /opt/gradle-$GRADLE_VERSION/bin/gradle /usr/local/bin/gradle
          gradle --version
      - name: Build
        script: |
          gradle assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab
